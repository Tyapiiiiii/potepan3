<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ストップストップウォッチ</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <h2>ストップウォッチ</h2>
    <div id="stopwatch">
        <span id="time">00:00:00</span>
        <div id="buttons">
            <button class="control" id="start">スタート</button>
            <button class="control" id="stop">ストップ</button>
            <button class="control" id="reset">リセット</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
